<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>super2D 試作ビューア(プレースホルダー)</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #1b1d22; color: #e8edf2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .page { max-width: 720px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
  h1 { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .note { font-size: 12px; color: #9aa3ad; line-height: 1.6; margin: 0 0 12px; }
  .stage-wrap {
    background: #f4f6f8; border-radius: 12px; overflow: hidden;
    display: flex; justify-content: center;
  }
  /* スマホの縦画面でキャンバスの縦幅がビューポートを占領し、ボタンが
     同時に見えなくなる問題への対応。canvas要素のwidth/height属性
     (WebGLの内部解像度、ゴールデンハッシュテスト等が前提にしている)は
     変更せず、CSS表示サイズだけをimgのobject-fit:containと同じ要領で
     ビューポートの高さに収まるよう縮小する。 */
  canvas { display: block; width: auto; height: auto; max-width: 100%; max-height: 48vh; }
  .controls { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: #2a2d34; color: #e8edf2; border: 1px solid #3c4049;
    border-radius: 8px; padding: 10px 14px; font-size: 13px; cursor: pointer;
  }
  button:active { background: #3c4049; }
  #status { font-size: 12px; color: #6ee7b7; margin-top: 10px; white-space: pre-wrap; }
  #state-controls { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .state-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .state-group-label { font-size: 12px; color: #9aa3ad; min-width: 70px; }
  .state-group button { padding: 6px 10px; }
  .export-row { margin-top: 12px; }
  .parallax-controls {
    margin-top: 12px; display: flex; flex-direction: column; gap: 8px;
    max-width: 360px; background: #24272e; border-radius: 10px; padding: 10px 14px;
  }
  .parallax-controls label { font-size: 12px; display: flex; flex-direction: column; gap: 4px; }
  .parallax-controls input[type="range"] { width: 100%; }
  /* 表情/ポーズ切替は種類が多く(30種類超のパーツもある)デフォルトで
     開いていると縦に長くなりすぎるため折りたたむ。呼吸・手振り等の
     主要デモ(.controls)はこの外に置き、常に見える状態を保つ。 */
  details.advanced { margin-top: 12px; }
  details.advanced > summary {
    cursor: pointer; font-size: 13px; color: #e8edf2; padding: 8px 0;
    -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body>
<div class="page">
  <h1>super2D 試作ビューア(プレースホルダーパーツ)</h1>
  <p class="note">
    円・四角の仮パーツで、リグ(親子階層・ピボット)とアニメーション
    (呼吸・首/髪の揺れ・まばたき・クロスフェード・肘の曲げ)の動作を
    確認するための試作。実画像(Gemini生成物)への差し替えを前提とする。
    <br />
    characters/&lt;id&gt;/を丸ごとZIP化したファイルをこのページに
    ドロップすると読み込めます。
  </p>
  <div class="stage-wrap">
    <canvas id="stage" width="600" height="760"></canvas>
  </div>
  <div class="controls">
    <button id="btn-wave">手を振る(肘の曲げデモ)</button>
    <button id="btn-talk">話す(口パクデモ)</button>
  </div>
  <details class="advanced">
    <summary>詳細設定(見返り・表情・ポーズ切替)</summary>
    <div class="parallax-controls">
      <label>頭のyaw(左右の見返り): <span id="yaw-value">0</span>°
        <input type="range" id="yaw" min="-15" max="15" value="0" step="1" />
      </label>
      <label>頭のpitch(上下の見上げ/見下ろし): <span id="pitch-value">0</span>°
        <input type="range" id="pitch" min="-15" max="15" value="0" step="1" />
      </label>
    </div>
    <div id="state-controls"></div>
  </details>
  <div class="export-row">
    <button id="btn-export">character.jsonを書き出す</button>
  </div>
  <div id="status">読み込み中…</div>
</div>
<script src="js/vendor/jszip.min.js"></script>
<script src="js/validate.js"></script>
<script src="js/viewer.js"></script>
</body>
</html>
