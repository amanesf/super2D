<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>スタジオ — super2D</title>
<style>
  :root{--bg:#07080a;--txt:#e8edf2;--mut:#9aa3ad;--line:rgba(255,255,255,.12);--green:#39ff9e;--pink:#ff2fb0}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .page{max-width:640px;margin:0 auto;padding:20px}
  h1{font-size:18px;margin:0 0 16px}
  .resumeBanner{display:none;margin:0 0 14px;padding:10px 14px;border:1px solid var(--green);
    border-radius:8px;background:rgba(57,255,158,.08);font-size:13px}
  .resumeBanner.show{display:block}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:16px}
  .tab{font-size:12.5px;padding:7px 10px;border-radius:6px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--mut);cursor:pointer}
  .tab.active{color:var(--txt);border-color:var(--pink);background:rgba(255,47,176,.08)}
  .tab.done::before{content:"✓ ";color:var(--green)}
  .panel{display:none;border:1px solid var(--line);border-radius:10px;padding:16px;background:rgba(255,255,255,.02)}
  .panel.active{display:block}
  .panel p{font-size:13.5px;line-height:1.8;color:#c7ccd3}
  #step-input .dropzone{border:1px dashed var(--line);border-radius:8px;padding:24px;text-align:center;font-size:13px;color:var(--mut)}
  .thumb{max-width:160px;max-height:160px;display:block;margin-top:10px;border-radius:6px;border:1px solid var(--line)}
  button.primary{margin-top:12px;padding:8px 16px;border-radius:6px;border:1px solid var(--pink);
    background:rgba(255,47,176,.12);color:var(--txt);font-size:13px;cursor:pointer}
  .apiKeyRow{margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
  .apiKeyRow label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px}
  .apiKeyRow input[type=password],.apiKeyRow input[type=text]{width:100%;max-width:340px;padding:7px 9px;
    border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--txt);font-size:13px}
  .genPaths{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .genPath{border:1px solid var(--line);border-radius:8px;padding:12px}
  .genPath h3{font-size:12.5px;margin:0 0 8px;color:var(--mut);font-weight:600}
  .promptBox{white-space:pre-wrap;font-size:11.5px;color:#c7ccd3;background:rgba(0,0,0,.3);
    border-radius:6px;padding:8px;max-height:120px;overflow:auto;margin-bottom:8px}
  button.secondary{padding:7px 12px;border-radius:6px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--txt);font-size:12.5px;cursor:pointer;margin-right:8px}
  .errMsg{color:#ff6b6b;font-size:12px;white-space:pre-wrap;margin-top:8px}
  .galleryGrid{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
  .candCard{border:1px solid var(--line);border-radius:8px;padding:8px;width:170px}
  .candCard.adopted{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
  .candCard img{width:100%;border-radius:6px;display:block;margin-bottom:6px}
  .candCard .meta{font-size:10.5px;color:var(--mut);margin-bottom:6px}
  .candCard textarea{width:100%;font-size:11.5px;padding:5px;border-radius:5px;border:1px solid var(--line);
    background:rgba(255,255,255,.03);color:var(--txt);resize:vertical;min-height:36px;margin-bottom:6px}
  .candCard .editClosed{font-size:11px;color:var(--mut);font-style:italic}
  .previewBox{margin-top:16px;padding-top:12px;border-top:1px solid var(--line)}
  .previewBox img{max-width:220px;display:block;margin-top:8px;border-radius:8px;border:1px solid var(--line)}
  .qcLayout{display:flex;flex-wrap:wrap;gap:20px}
  .qcControls{flex:1 1 260px}
  .qcControls label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
  .qcControls select,.qcControls input[type=range]{width:100%}
  #qc-viewer-frame{width:300px;height:380px;border:1px solid var(--line);border-radius:8px}
  #qc-zoom-canvas{border:1px solid var(--line);border-radius:8px;background:#000}
  .qcStatus{margin-top:10px;padding:8px 10px;border-radius:6px;font-size:12.5px}
  .qcStatus.ok{background:rgba(57,255,158,.1);color:var(--green)}
  .qcStatus.gap{background:rgba(255,47,176,.12);color:#ff6b9e}
</style></head>
<body>
<div class="page">
  <h1>スタジオ(Stage D)</h1>
  <div class="resumeBanner" id="resumeBanner">前回の続きから再開しました。</div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<script src="js/idb.js"></script>
<script src="js/studio_pipeline.js"></script>
<script src="js/gemini_api.js"></script>
<script src="js/gallery.js"></script>
<script src="js/generation_log.js"></script>
<script src="js/seam_qc.js"></script>
<script>
(function(){
  "use strict";
  const P = window.S2D.studioPipeline;
  let session = null;

  function render() {
    const tabsEl = document.getElementById("tabs");
    tabsEl.innerHTML = "";
    P.STEPS.forEach((step) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (step.id === session.currentStepId ? " active" : "")
        + (session.completedStepIds.includes(step.id) ? " done" : "");
      btn.textContent = step.title;
      btn.dataset.stepId = step.id;
      btn.addEventListener("click", () => {
        session.currentStepId = step.id;
        saveAndRender();
      });
      tabsEl.appendChild(btn);
    });

    const panelsEl = document.getElementById("panels");
    panelsEl.innerHTML = "";
    P.STEPS.forEach((step) => {
      const panel = document.createElement("div");
      const isActive = step.id === session.currentStepId;
      panel.className = "panel" + (isActive ? " active" : "");
      panel.id = "step-" + step.id;
      // qcタブだけはiframe(viewer.html)を埋め込むため、非アクティブな
      // 状態でも毎回並行構築すると前回のiframeのloadイベントが後から
      // 発火し、現在アクティブなタブの状態を古い参照で上書きしてしまう。
      // 他のタブは(iframeを持たないため)これまで通り常に構築し、非表示
      // でも状態(サムネイル等)を保持する。
      if (step.id === "qc" && !isActive) {
        // 何もしない(タブ切替時に改めて構築される)
      } else if (step.id === "input") {
        panel.appendChild(buildInputPanel());
      } else if (step.id === "parts") {
        panel.appendChild(buildGalleryPanel(step));
      } else if (step.id === "qc") {
        panel.appendChild(buildQcPanel(step));
      } else if (step.generation) {
        panel.appendChild(buildGenerationPanel(step));
      } else {
        const p = document.createElement("p");
        p.textContent = "(このステップの実処理は後続タスクで実装する)";
        panel.appendChild(p);
      }
      panelsEl.appendChild(panel);
    });
  }

  function buildInputPanel() {
    const wrap = document.createElement("div");
    const dz = document.createElement("div");
    dz.className = "dropzone";
    dz.textContent = "参照画像(ダミーでよい)を選択してください";
    wrap.appendChild(dz);

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.id = "master-image-input";
    input.style.marginTop = "10px";
    wrap.appendChild(input);

    const existingData = session.stepData.input;
    let thumb = null;
    if (existingData && existingData.dataUrl) {
      thumb = document.createElement("img");
      thumb.className = "thumb";
      thumb.id = "master-image-thumb";
      thumb.src = existingData.dataUrl;
      wrap.appendChild(thumb);
    }

    input.addEventListener("change", () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        session.stepData.input = { fileName: file.name, dataUrl: reader.result };
        P.markStepComplete(session, "input", session.stepData.input);
        saveAndRender();
      };
      reader.readAsDataURL(file);
    });

    const keyRow = document.createElement("div");
    keyRow.className = "apiKeyRow";
    const label = document.createElement("label");
    label.textContent = "Gemini APIキー(任意。未設定でも手動フォールバック経路で進められます)";
    label.htmlFor = "gemini-api-key-input";
    keyRow.appendChild(label);
    const keyInput = document.createElement("input");
    keyInput.type = "password";
    keyInput.id = "gemini-api-key-input";
    keyInput.value = window.S2D.geminiApi.getApiKey();
    keyInput.addEventListener("change", () => {
      window.S2D.geminiApi.setApiKey(keyInput.value.trim());
    });
    keyRow.appendChild(keyInput);
    wrap.appendChild(keyRow);

    return wrap;
  }

  // D2: 生成系ステップ共通のUI。「APIで生成」「プロンプトをコピー」
  // 「画像をアップロード」の3経路を用意し、いずれの経路でも同じ
  // stepData構造(outputImage)に合流させる(PLAN.md「3経路→同じ後続処理」)。
  function buildGenerationPanel(step) {
    const wrap = document.createElement("div");
    const stepData = session.stepData[step.id] || {};

    const promptBox = document.createElement("div");
    promptBox.className = "promptBox";
    promptBox.textContent = "(プロンプト読み込み中...)";
    wrap.appendChild(promptBox);
    if (step.promptFile) {
      fetch(step.promptFile)
        .then((r) => r.text())
        .then((t) => { promptBox.textContent = t; })
        .catch((e) => { promptBox.textContent = `プロンプト読み込み失敗: ${e.message}`; });
    }

    const paths = document.createElement("div");
    paths.className = "genPaths";

    // 経路A: APIで生成
    const pathApi = document.createElement("div");
    pathApi.className = "genPath";
    pathApi.innerHTML = "<h3>経路A: APIで生成</h3>";
    const apiBtn = document.createElement("button");
    apiBtn.className = "secondary";
    apiBtn.textContent = "APIで生成";
    apiBtn.id = `gen-api-btn-${step.id}`;
    const apiErr = document.createElement("div");
    apiErr.className = "errMsg";
    apiErr.id = `gen-api-err-${step.id}`;
    apiBtn.addEventListener("click", async () => {
      apiErr.textContent = "";
      try {
        const result = await window.S2D.geminiApi.callGemini({ prompt: promptBox.textContent });
        const img = result.images[0];
        if (!img) throw new Error("Geminiのレスポンスに画像が含まれていませんでした");
        applyStepOutput(step, `data:${img.mimeType};base64,${img.base64}`, "api");
      } catch (e) {
        apiErr.textContent = e.message;
      }
    });
    pathApi.appendChild(apiBtn);
    pathApi.appendChild(apiErr);
    paths.appendChild(pathApi);

    // 経路B: プロンプトをコピー(手動でGeminiに貼り付けてもらう)
    const pathCopy = document.createElement("div");
    pathCopy.className = "genPath";
    pathCopy.innerHTML = "<h3>経路B: プロンプトをコピーして手動生成</h3>";
    const copyBtn = document.createElement("button");
    copyBtn.className = "secondary";
    copyBtn.textContent = "プロンプトをコピー";
    copyBtn.id = `gen-copy-btn-${step.id}`;
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(promptBox.textContent);
        copyBtn.textContent = "コピーしました";
        setTimeout(() => { copyBtn.textContent = "プロンプトをコピー"; }, 1500);
      } catch (e) {
        copyBtn.textContent = `コピー失敗: ${e.message}`;
      }
    });
    pathCopy.appendChild(copyBtn);
    paths.appendChild(pathCopy);

    // 経路C: 画像を手動アップロード(APIキー無しで完結する経路)
    const pathUpload = document.createElement("div");
    pathUpload.className = "genPath";
    pathUpload.innerHTML = "<h3>経路C: 生成済み画像をアップロード</h3>";
    const uploadInput = document.createElement("input");
    uploadInput.type = "file";
    uploadInput.accept = "image/*";
    uploadInput.id = `gen-upload-input-${step.id}`;
    uploadInput.addEventListener("change", () => {
      const file = uploadInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => applyStepOutput(step, reader.result, "manual-upload");
      reader.readAsDataURL(file);
    });
    pathUpload.appendChild(uploadInput);
    paths.appendChild(pathUpload);

    wrap.appendChild(paths);

    if (stepData.outputImage) {
      const thumb = document.createElement("img");
      thumb.className = "thumb";
      thumb.id = `gen-output-thumb-${step.id}`;
      thumb.src = stepData.outputImage;
      wrap.appendChild(thumb);
    }

    return wrap;
  }

  // D6: ベストオブNギャラリー+プロンプト微修正(会話継続編集)。
  // 実際の検出結果に基づく複数パーツへの拡張は後続タスクだが、ギャラリー
  // 機構(候補管理・採用切替・修正連鎖の歯止め)自体はここで完結させる。
  const DEMO_PART = "demo_part";

  function getPartsGalleries() {
    if (!session.stepData.parts) session.stepData.parts = { galleries: {} };
    if (!session.stepData.parts.galleries[DEMO_PART]) {
      session.stepData.parts.galleries[DEMO_PART] = window.S2D.gallery.createGallery();
    }
    return session.stepData.parts.galleries[DEMO_PART];
  }

  function buildGalleryPanel(step) {
    const G = window.S2D.gallery;
    const gallery = getPartsGalleries();
    const wrap = document.createElement("div");

    const addRow = document.createElement("div");
    addRow.className = "genPath";
    addRow.innerHTML = "<h3>候補を追加(生成済み画像を手動アップロード)</h3>";
    const addInput = document.createElement("input");
    addInput.type = "file";
    addInput.accept = "image/*";
    addInput.id = "gallery-add-input";
    addInput.addEventListener("change", () => {
      const file = addInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        G.addCandidate(gallery, { imageDataUrl: reader.result, source: "manual-upload" });
        window.S2D.generationLog.append({
          partName: DEMO_PART,
          source: "manual-upload",
          adopted: true,
        });
        onGalleryChanged(step);
      };
      reader.readAsDataURL(file);
      addInput.value = "";
    });
    addRow.appendChild(addInput);
    wrap.appendChild(addRow);

    const grid = document.createElement("div");
    grid.className = "galleryGrid";
    gallery.candidates.forEach((cand) => {
      grid.appendChild(buildCandidateCard(step, gallery, cand));
    });
    wrap.appendChild(grid);

    const previewBox = document.createElement("div");
    previewBox.className = "previewBox";
    previewBox.innerHTML = "<h3>合成プレビュー(採用中の候補)</h3>";
    const adopted = G.getAdopted(gallery);
    if (adopted) {
      const previewImg = document.createElement("img");
      previewImg.id = "gallery-preview-img";
      previewImg.src = adopted.imageDataUrl;
      previewBox.appendChild(previewImg);
    } else {
      const none = document.createElement("p");
      none.textContent = "(まだ候補がありません)";
      previewBox.appendChild(none);
    }
    wrap.appendChild(previewBox);

    return wrap;
  }

  function buildCandidateCard(step, gallery, cand) {
    const G = window.S2D.gallery;
    const card = document.createElement("div");
    card.className = "candCard" + (gallery.adoptedId === cand.id ? " adopted" : "");
    card.id = `gallery-card-${cand.id}`;

    const img = document.createElement("img");
    img.src = cand.imageDataUrl;
    card.appendChild(img);

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `source: ${cand.source} / chain: ${cand.chainDepth}`;
    card.appendChild(meta);

    const adoptBtn = document.createElement("button");
    adoptBtn.className = "secondary";
    adoptBtn.id = `gallery-adopt-btn-${cand.id}`;
    adoptBtn.textContent = gallery.adoptedId === cand.id ? "採用中" : "採用にする";
    adoptBtn.addEventListener("click", () => {
      G.adoptCandidate(gallery, cand.id);
      onGalleryChanged(step);
    });
    card.appendChild(adoptBtn);

    if (G.canAddEdit(gallery, cand.id)) {
      const textarea = document.createElement("textarea");
      textarea.placeholder = "この画像への修正指示(例: 髪の色をもっと明るく)";
      textarea.id = `gallery-edit-text-${cand.id}`;
      card.appendChild(textarea);

      const editUploadLabel = document.createElement("div");
      editUploadLabel.style.fontSize = "10.5px";
      editUploadLabel.style.color = "var(--mut)";
      editUploadLabel.textContent = "修正版画像(手動アップロード。APIの会話継続はgemini_api.jsのhistory機構で後日配線)";
      card.appendChild(editUploadLabel);

      const editUpload = document.createElement("input");
      editUpload.type = "file";
      editUpload.accept = "image/*";
      editUpload.id = `gallery-edit-upload-${cand.id}`;
      editUpload.addEventListener("change", () => {
        const file = editUpload.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const editInstruction = textarea.value;
          try {
            G.addEditedCandidate(gallery, cand.id, {
              imageDataUrl: reader.result,
              source: "manual-upload",
              editInstruction,
            });
            window.S2D.generationLog.append({
              partName: DEMO_PART,
              source: "manual-upload",
              editInstruction,
              parentId: cand.id,
              adopted: true,
            });
            onGalleryChanged(step);
          } catch (e) {
            alert(e.message);
          }
        };
        reader.readAsDataURL(file);
      });
      card.appendChild(editUpload);
    } else {
      const closed = document.createElement("div");
      closed.className = "editClosed";
      closed.id = `gallery-edit-closed-${cand.id}`;
      closed.textContent = `修正の連鎖は${G.MAX_EDIT_CHAIN}回までのため、この候補への修正指示欄は閉じています`;
      card.appendChild(closed);
    }

    return card;
  }

  // D7: 継ぎ目QC画面。viewer.htmlを同一オリジンのiframeで埋め込み、
  // window.S2D.viewerDebug(js/viewer.js)経由で関節角度を直接スクラブ/
  // 自動往復させ、接続部をズーム表示する。js/seam_qc.jsで隙間(透過)の
  // 有無を数値でも判定する(目視だけに頼らない)。
  let qcSweepHandle = null;
  let qcRafHandle = null;

  function buildQcPanel(step) {
    // タブを離れて戻ってきた際、前回のパネルが回していたループ/
    // ストレステストのタイマーを止めてから作り直す(取り残されたコール
    // バックが削除済みDOMを触り続けるのを防ぐ)。
    if (qcSweepHandle) { clearInterval(qcSweepHandle); qcSweepHandle = null; }
    if (qcRafHandle) { cancelAnimationFrame(qcRafHandle); qcRafHandle = null; }

    const wrap = document.createElement("div");
    const layout = document.createElement("div");
    layout.className = "qcLayout";

    const frame = document.createElement("iframe");
    frame.id = "qc-viewer-frame";
    frame.src = "viewer.html";
    layout.appendChild(frame);

    const controls = document.createElement("div");
    controls.className = "qcControls";

    const partLabel = document.createElement("label");
    partLabel.textContent = "検査対象パーツ";
    controls.appendChild(partLabel);
    const partSelect = document.createElement("select");
    partSelect.id = "qc-part-select";
    controls.appendChild(partSelect);

    const angleLabel = document.createElement("label");
    angleLabel.textContent = "関節角度(度)";
    controls.appendChild(angleLabel);
    const angleSlider = document.createElement("input");
    angleSlider.type = "range";
    angleSlider.id = "qc-angle-slider";
    angleSlider.min = "-90";
    angleSlider.max = "90";
    angleSlider.value = "0";
    controls.appendChild(angleSlider);

    const sweepBtn = document.createElement("button");
    sweepBtn.className = "secondary";
    sweepBtn.id = "qc-sweep-btn";
    sweepBtn.textContent = "自動往復ストレステスト開始";
    controls.appendChild(document.createElement("br"));
    controls.appendChild(sweepBtn);

    const zoomCanvas = document.createElement("canvas");
    zoomCanvas.id = "qc-zoom-canvas";
    zoomCanvas.width = 220;
    zoomCanvas.height = 220;
    controls.appendChild(document.createElement("br"));
    controls.appendChild(zoomCanvas);

    const statusEl = document.createElement("div");
    statusEl.className = "qcStatus ok";
    statusEl.id = "qc-gap-status";
    statusEl.textContent = "(パーツ選択後、判定を表示します)";
    controls.appendChild(statusEl);

    layout.appendChild(controls);
    wrap.appendChild(layout);

    let debugApi = null;
    // 静止姿勢(角度0)でのズーム範囲を基準として保持し、以後は「そこから
    // 新たに透過になった画素があるか」で判定する(パーツ選択が変わるたびに
    // 取り直す)。関節の外側はそもそも背景で透過なので、単純な透過閾値
    // だけでは「継ぎ目の穴」と区別できないため。
    let baselineImageData = null;

    function updateZoomAndStatus() {
      if (!debugApi) return;
      const partName = partSelect.value;
      const pivot = debugApi.getWorldPivot(partName);
      const srcCanvas = debugApi.getCanvas();
      if (!pivot || !srcCanvas) return;
      const ctx = zoomCanvas.getContext("2d");
      const cropRadius = 60;
      ctx.clearRect(0, 0, zoomCanvas.width, zoomCanvas.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(
        srcCanvas,
        pivot.x - cropRadius, pivot.y - cropRadius, cropRadius * 2, cropRadius * 2,
        0, 0, zoomCanvas.width, zoomCanvas.height
      );
      const imageData = ctx.getImageData(0, 0, zoomCanvas.width, zoomCanvas.height);

      if (!baselineImageData) {
        baselineImageData = imageData;
        statusEl.className = "qcStatus ok";
        statusEl.textContent = "(静止姿勢を基準として記録しました)";
        return;
      }

      // 数px程度のアンチエイリアシング由来の差はメッシュ変形では常に
      // 起こりうる(境界の丸め)。B1のような「継ぎ目が開く」不具合は
      // これよりずっと大きい面積で穴が出るため、小さな許容値を設けて
      // ノイズと実際の不具合を区別する。
      const NOISE_TOLERANCE_PX = 20;
      const result = window.S2D.seamQc.detectSeamRegression(
        baselineImageData, imageData, zoomCanvas.width / 2, zoomCanvas.height / 2, 40
      );
      const hasSignificantGap = result.newGapPixelCount > NOISE_TOLERANCE_PX;
      statusEl.className = "qcStatus " + (hasSignificantGap ? "gap" : "ok");
      statusEl.textContent = hasSignificantGap
        ? `継ぎ目に隙間を検出(静止姿勢では不透明だった画素が${result.newGapPixelCount}個透過になった)`
        : `継ぎ目OK(静止姿勢に対する透過画素の増加は${result.newGapPixelCount}個、許容範囲内)`;
    }

    function loop() {
      updateZoomAndStatus();
      qcRafHandle = requestAnimationFrame(loop);
    }

    angleSlider.addEventListener("input", () => {
      if (!debugApi) return;
      const rad = (Number(angleSlider.value) * Math.PI) / 180;
      debugApi.setAngleOverride(partSelect.value, rad);
    });

    partSelect.addEventListener("change", () => {
      if (!debugApi) return;
      debugApi.clearAllOverrides();
      angleSlider.value = "0";
      debugApi.setAngleOverride(partSelect.value, 0);
      baselineImageData = null; // 選択パーツが変わったら基準を取り直す
    });

    sweepBtn.addEventListener("click", () => {
      if (qcSweepHandle) {
        clearInterval(qcSweepHandle);
        qcSweepHandle = null;
        sweepBtn.textContent = "自動往復ストレステスト開始";
        return;
      }
      sweepBtn.textContent = "自動往復ストレステスト停止";
      const start = performance.now();
      qcSweepHandle = setInterval(() => {
        const tSec = (performance.now() - start) / 1000;
        const deg = Math.sin(tSec * 1.5) * 90;
        angleSlider.value = String(Math.round(deg));
        if (debugApi) debugApi.setAngleOverride(partSelect.value, (deg * Math.PI) / 180);
      }, 30);
    });

    frame.addEventListener("load", () => {
      const waitForReady = setInterval(() => {
        const win = frame.contentWindow;
        if (win && win.S2D && win.S2D.viewerDebug && win.S2D.viewerDebug.getPartNames().length > 0) {
          clearInterval(waitForReady);
          debugApi = win.S2D.viewerDebug;
          partSelect.innerHTML = "";
          for (const name of debugApi.getPartNames()) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            partSelect.appendChild(opt);
          }
          window.__qcReady = true;
          loop();
        }
      }, 50);
    });

    return wrap;
  }

  function onGalleryChanged(step) {
    P.markStepDataOnly(session, step.id, session.stepData[step.id]);
    saveAndRender();
  }

  function applyStepOutput(step, dataUrl, source) {
    session.stepData[step.id] = { outputImage: dataUrl, source };
    P.markStepComplete(session, step.id, session.stepData[step.id]);
    saveAndRender();
  }

  function saveAndRender() {
    P.saveSession(session);
    render();
  }

  (async function init() {
    const saved = await window.S2D.idb.get("studio_session");
    session = saved || P.defaultSession();
    if (saved) {
      document.getElementById("resumeBanner").classList.add("show");
    }
    render();
    document.getElementById("status") && (document.getElementById("status").textContent = "読み込み完了");
    window.__studioReady = true;
  })();
})();
</script>
</body></html>
